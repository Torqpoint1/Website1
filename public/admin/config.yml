backend:
  name: github
  repo: torqpoint1/website1
  branch: main
  base_url: https://torqpoint.com

media_folder: public/images
public_folder: /images

collections:
  - name: journal
    label: Journal
    label_singular: Journal post
    folder: content/journal
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: Excerpt, name: excerpt, widget: text, hint: "A one-sentence summary shown on the Journal listing page." }
      - { label: Body, name: body, widget: markdown }

  - name: work
    label: Work / Case Studies
    label_singular: Case study
    folder: content/work
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Client, name: client, widget: string, required: false, hint: "Company or trade name shown as the eyebrow label." }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: Summary, name: summary, widget: text, hint: "One or two lines shown on the card and at the top of the case study." }
      - { label: Cover image, name: cover, widget: image, required: false, hint: "Optional. Recommended size: 1600 × 900px." }
      - { label: Body, name: body, widget: markdown }
